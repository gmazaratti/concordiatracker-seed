<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved theme before first paint so there's no flash of the default.
      try {
        var t = localStorage.getItem('ct_theme')
        if (t === 'dark' || t === 'maroon' || t === 'light' || t === 'purple')
          document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0f0f16" />

    <!-- Installed-app (PWA) standalone behaviour -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="ConcordiaTracker" />
    <meta name="robots" content="index, follow" />

    <title>ConcordiaTracker — GPA, syllabus &amp; assignment tracker for Concordia students</title>
    <meta
      name="description"
      content="A GPA calculator, syllabus tracker, and assignment &amp; deadline tracker for Concordia students — import any syllabus, track every deadline, and predict your GPA in one place."
    />
    <link rel="canonical" href="https://concordiatracker.com/" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ConcordiaTracker" />
    <meta property="og:title" content="ConcordiaTracker — GPA, syllabus &amp; assignment tracker for Concordia students" />
    <meta
      property="og:description"
      content="A GPA calculator, syllabus tracker, and assignment &amp; deadline tracker for Concordia students — every syllabus, deadline, and grade in one place."
    />
    <meta property="og:url" content="https://concordiatracker.com/" />
    <meta property="og:image" content="https://concordiatracker.com/og-image.png" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConcordiaTracker — GPA, syllabus &amp; assignment tracker for Concordia students" />
    <meta
      name="twitter:description"
      content="A GPA calculator, syllabus tracker, and assignment &amp; deadline tracker for Concordia students — every syllabus, deadline, and grade in one place."
    />
    <meta name="twitter:image" content="https://concordiatracker.com/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
