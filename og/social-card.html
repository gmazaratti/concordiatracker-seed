<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      GitHub social preview card — 1280×640.
      Built from the app's real design tokens (src/index.css): canvas #0f0f16,
      sage/eucalyptus accent #8fb39a, fg #f4f3f7, muted #b2b0c2, subtle #8b8898,
      surface-2 #222231 — and the real display face, Hanken Grotesk.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1280px;
        height: 640px;
      }

      .card {
        position: relative;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: #0f0f16; /* --ct-canvas */
        font-family: 'Hanken Grotesk', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 0 112px;
        -webkit-font-smoothing: antialiased;
      }

      /* soft sage glow — low intensity, offset behind the wordmark */
      .glow {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(880px 560px at 26% 38%, rgba(143, 179, 154, 0.16), transparent 60%),
          radial-gradient(700px 500px at 86% 92%, rgba(143, 179, 154, 0.06), transparent 60%);
      }

      /* faint bottom vignette to settle the composition */
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(1200px 760px at 50% 128%, rgba(0, 0, 0, 0.4), transparent 58%);
      }

      .content {
        position: relative;
        z-index: 1;
      }

      .mark {
        width: 84px;
        height: 84px;
        margin-bottom: 34px;
        display: block;
        filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.45));
      }

      .wordmark {
        font-size: 104px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.022em;
        color: #f4f3f7; /* --ct-fg */
      }
      .wordmark .t {
        color: #b2b0c2; /* --ct-muted */
      }

      .tagline {
        margin-top: 28px;
        font-size: 34px;
        font-weight: 400;
        letter-spacing: -0.005em;
        color: #8b8898; /* --ct-subtle */
      }
      .tagline .accent-dot {
        color: #8fb39a; /* --ct-accent */
      }

      /* a thin accent rule for a touch of brand, kept minimal */
      .rule {
        margin-top: 40px;
        width: 132px;
        height: 4px;
        border-radius: 999px;
        background: #8fb39a; /* --ct-accent */
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>
      <div class="vignette"></div>

      <div class="content">
        <!-- real "C." brand mark (src/components/Logo.tsx), scaled up -->
        <svg class="mark" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#222231" />
          <path
            d="M21.6 11.4a6.7 6.7 0 1 0 0 9.2"
            fill="none"
            stroke="#8fb39a"
            stroke-width="3"
            stroke-linecap="round"
          />
          <circle cx="22.6" cy="16" r="1.8" fill="#8fb39a" />
        </svg>

        <h1 class="wordmark">Concordia<span class="t">Tracker</span></h1>
        <p class="tagline">Stop guessing what's due<span class="accent-dot">.</span></p>

        <div class="rule"></div>
      </div>
    </div>
  </body>
</html>
